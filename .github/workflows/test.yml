name: Backend Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r backend/requirements.txt
        pip install pytest httpx

    - name: Run tests
      working-directory: backend
      env:
        TESTING: "1"
        SECRET_KEY: testsecret123
        ALGORITHM: HS256
        DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/finance_test
      run: pytest -v